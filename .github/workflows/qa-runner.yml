name: Talana QA — Asistencia y Turnos
 
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a ejecutar'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - asistencia
          - turnos
          - todas
  push:
    paths:
      - 'tests/**'
 
jobs:
  qa-tests:
    name: Ejecutar pruebas de Talana
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
 
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Instalar dependencias
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install chromium --with-deps
 
      - name: Crear archivo de configuración con credenciales
        env:
          TALANA_EMAIL: ${{ secrets.TALANA_EMAIL }}
          TALANA_PASS: ${{ secrets.TALANA_PASS }}
        run: |
          mkdir -p data
          cat > data/credenciales.json << CREDS
          {
          "baseUrl": "https://qa-asistencia.talana.dev",
          "loginPath": "/es/remuneraciones/login-vue?next=/es/remuneraciones/#/",
          "usuario": "${TALANA_EMAIL}",
          "clave": "${TALANA_PASS}"
          }
          CREDS
 
      - name: Ejecutar suite — ${{ github.event.inputs.suite || 'smoke' }}
        run: npx playwright test --reporter=html,json
        env:
          SUITE: ${{ github.event.inputs.suite || 'smoke' }}
 
      - name: Subir evidencias (videos, fotos, logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30
 
      - name: Notificar resultado a Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
 
          if [ "$STATUS" = "success" ]; then
            COLOR="good"
            ICON=":white_check_mark:"
            TEXTO="Todas las pruebas pasaron correctamente"
          else
            COLOR="danger"
            ICON=":x:"
            TEXTO="Una o más pruebas fallaron — revisar evidencias"
          fi
 
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"blocks\": [
                  {\"type\":\"header\",\"text\":{\"type\":\"plain_text\",\"text\":\"${ICON} Talana QA — Asistencia y Turnos\"}},
                  {\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Estado:* ${STATUS}\n*Suite:* ${{ github.event.inputs.suite || 'smoke' }}\n${TEXTO}\"}},
                  {\"type\":\"actions\",\"elements\":[{\"type\":\"button\",\"text\":{\"type\":\"plain_text\",\"text\":\"Ver evidencias y video\"},\"url\":\"${RUN_URL}\"}]}
                ]
              }]
            }"
