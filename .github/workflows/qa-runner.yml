name: Talana QA — Asistencia y Turnos
 
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a ejecutar'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - asistencia
          - turnos
          - todas
  push:
    paths:
      - 'tests/**'
 
jobs:
  qa-tests:
    name: Ejecutar pruebas de Talana
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
 
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Instalar dependencias
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install chromium --with-deps
 
      - name: Crear archivo de configuración con credenciales
        env:
          TALANA_EMAIL: ${{ secrets.TALANA_EMAIL }}
          TALANA_PASS: ${{ secrets.TALANA_PASS }}
        run: |
          mkdir -p data
          cat > data/credenciales.json << CREDS
          {
          "baseUrl": "https://qa-asistencia.talana.dev",
          "loginPath": "/es/remuneraciones/login-vue?next=/es/remuneraciones/#/",
          "usuario": "${TALANA_EMAIL}",
          "clave": "${TALANA_PASS}"
          }
          CREDS
 
      - name: Ejecutar suite — ${{ github.event.inputs.suite || 'smoke' }}
        run: npx playwright test --reporter=html,json
        env:
          SUITE: ${{ github.event.inputs.suite || 'smoke' }}
 
      - name: Subir evidencias (videos, fotos, logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30
 
      - name: Procesar resultados y enviar a Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          # Leer el archivo de resultados JSON
          if [ -f "test-results/results.json" ]; then
            RESULTS=$(cat test-results/results.json)
            
            # Extraer información de las pruebas
            TOTAL_TESTS=$(echo "$RESULTS" | grep -o '"title"' | wc -l)
            PASSED=$(echo "$RESULTS" | grep -o '"status":"passed"' | wc -l)
            FAILED=$(echo "$RESULTS" | grep -o '"status":"failed"' | wc -l)
            
            # Extraer nombres de las pruebas
            TEST_NAMES=$(echo "$RESULTS" | grep -o '"title":"[^"]*"' | sed 's/"title":"\(.*\)"/\1/' | head -5)
          else
            TOTAL_TESTS="0"
            PASSED="0"
            FAILED="0"
            TEST_NAMES="No tests found"
          fi
 
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [ "$STATUS" = "success" ]; then
            COLOR="good"
            ICON=":white_check_mark:"
            ESTADO_TEXTO="✅ EXITOSAS"
          else
            COLOR="danger"
            ICON=":x:"
            ESTADO_TEXTO="❌ FALLIDAS"
          fi
 
          # Crear el payload JSON con los detalles
          cat > /tmp/slack_payload.json << 'EOF'
          {
            "attachments": [{
              "color": "COLOR_PLACEHOLDER",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "ICON_PLACEHOLDER Talana QA — Asistencia y Turnos"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Estado:* ESTADO_TEXTO\n*Suite ejecutada:* SUITE_PLACEHOLDER\n*Total de pruebas:* TOTAL_PLACEHOLDER\n*Pasadas:* PASSED_PLACEHOLDER\n*Fallidas:* FAILED_PLACEHOLDER"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pruebas ejecutadas:*\nTEST_NAMES_PLACEHOLDER"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Ver reporte detallado"
                      },
                      "url": "URL_PLACEHOLDER"
                    }
                  ]
                }
              ]
            }]
          }
          EOF
 
          # Reemplazar placeholders
          sed -i "s|COLOR_PLACEHOLDER|${COLOR}|g" /tmp/slack_payload.json
          sed -i "s|ICON_PLACEHOLDER|${ICON}|g" /tmp/slack_payload.json
          sed -i "s|ESTADO_TEXTO|${ESTADO_TEXTO}|g" /tmp/slack_payload.json
          sed -i "s|SUITE_PLACEHOLDER|${{ github.event.inputs.suite || 'smoke' }}|g" /tmp/slack_payload.json
          sed -i "s|TOTAL_PLACEHOLDER|${TOTAL_TESTS}|g" /tmp/slack_payload.json
          sed -i "s|PASSED_PLACEHOLDER|${PASSED}|g" /tmp/slack_payload.json
          sed -i "s|FAILED_PLACEHOLDER|${FAILED}|g" /tmp/slack_payload.json
          sed -i "s|URL_PLACEHOLDER|${RUN_URL}|g" /tmp/slack_payload.json
          
          # Formatear nombres de pruebas para Slack
          TEST_NAMES_FORMATTED=$(echo "$TEST_NAMES" | sed 's/^/• /')
          sed -i "s|TEST_NAMES_PLACEHOLDER|${TEST_NAMES_FORMATTED}|g" /tmp/slack_payload.json
 
          # Enviar a Slack
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack_payload.json
